<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perhitungan Bonus Pembelian</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #08e6a3;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 450px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    button {
      width: 48%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-hitung {
      background-color: #a5282a;
      color: rgb(10, 5, 5);
    }

    .btn-reset {
      background-color: #f4e436;
      color: white;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border: 1px solid #ddd;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .total {
      font-weight: bold;
      background-color: #17010a;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Hitung Bonus Pembelian</h2>

    <label for="nama">Nama Pelanggan</label>
    <input type="text" id="nama" placeholder="Masukkan nama pelanggan">

    <label for="produk">Nama Produk</label>
    <input type="text" id="produk" placeholder="Masukkan nama produk">

    <label for="harga">Harga Produk (Rp)</label>
    <input type="number" id="harga" placeholder="Masukkan harga produk">

    <label for="jumlah">Jumlah Pembelian</label>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah pembelian">

    <div class="button-group">
      <button class="btn-hitung" onclick="hitung()">Hitung</button>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>

    <div id="hasil"></div>
  </div>

  <script>
    function hitung() {
      let nama = document.getElementById("nama").value;
      let produk = document.getElementById("produk").value;
      let harga = Number(document.getElementById("harga").value);
      let jumlah = Number(document.getElementById("jumlah").value);

      if (nama === "" || produk === "" || harga <= 0 || jumlah <= 0) {
        alert("Semua data harus diisi dengan benar!");
        return;
      }

      let totalBelanja = harga * jumlah;
      let bonus = "";
      let potongan = 0;

      if (totalBelanja >= 400000) {
        bonus = "Mendapat Potongan Rp50.000";
        potongan = 50000;
      } else {
        bonus = "Tidak Mendapat Bonus";
      }

      let totalBayar = totalBelanja - potongan;

      document.getElementById("hasil").innerHTML = `
        <table>
          <tr>
            <td>Nama Pelanggan</td>
            <td>${nama}</td>
          </tr>
          <tr>
            <td>Nama Produk</td>
            <td>${produk}</td>
          </tr>
          <tr>
            <td>Harga Produk</td>
            <td>Rp ${harga.toLocaleString('id-ID')}</td>
          </tr>
          <tr>
            <td>Jumlah Pembelian</td>
            <td>${jumlah}</td>
          </tr>
          <tr>
            <td>Total Belanja</td>
            <td>Rp ${totalBelanja.toLocaleString('id-ID')}</td>
          </tr>
          <tr>
            <td>Bonus</td>
            <td>${bonus}</td>
          </tr>
          <tr>
            <td>Potongan</td>
            <td>Rp ${potongan.toLocaleString('id-ID')}</td>
          </tr>
          <tr class="total">
            <td>Total Bayar</td>
            <td>Rp ${totalBayar.toLocaleString('id-ID')}</td>
          </tr>
        </table>
      `;
    }

    function resetForm() {
      document.getElementById("nama").value = "";
      document.getElementById("produk").value = "";
      document.getElementById("harga").value = "";
      document.getElementById("jumlah").value = "";
      document.getElementById("hasil").innerHTML = "";
    }
  </script>

</body>
</html>
